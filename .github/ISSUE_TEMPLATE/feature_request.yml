name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the mapping scenario you can't express today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: What would the mapping definition or option look like?
      render: ts
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
