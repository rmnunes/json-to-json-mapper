name: Bug report
description: Something behaves incorrectly
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "2.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Input object, mappings, and the map() call that misbehaves.
      render: ts
      placeholder: |
        const { result, errors } = map(
          { a: 1 },
          [{ source: "a", target: "b" }]
        );
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
    validations:
      required: true
