name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run check:dist
      - name: Coverage
        if: matrix.node-version == '22.x'
        run: pnpm run test:coverage
      - name: Benchmark gate
        if: matrix.node-version == '22.x'
        # Absolute numbers vary by runner hardware, so CI loosens the
        # per-scenario tolerance; the compile/map ratio check keeps full
        # strength everywhere (it is machine-independent).
        env:
          BENCH_TOLERANCE: "0.5"
        run: pnpm run bench:check
