# Publishes to npm via OIDC trusted publishing — no long-lived token needed.
#
# One-time setup on npmjs.com (package settings → Publishing access →
# Trusted Publisher):
#   - Provider:  GitHub Actions
#   - Repository: rmnunes/json-to-json-mapper
#   - Workflow:  npm-publish.yml   (filename only, no path prefix)
#   - Environment: leave empty
#
# IMPORTANT: do NOT add `registry-url` to setup-node or set NODE_AUTH_TOKEN
# here. That writes an `_authToken=${NODE_AUTH_TOKEN}` line into .npmrc, and
# a configured (even empty) token takes precedence over OIDC — npm then
# publishes with empty credentials and the registry answers 404.

name: Publish package

on:
  release:
    types: [created]
  # Manual fallback: release-triggered re-runs execute the workflow file as
  # of the tag's commit, so fixes to this file only take effect for new
  # releases — or via this manual trigger, which runs from the chosen branch.
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "pnpm"
      # Trusted publishing requires npm >= 11.5.1; update the bundled CLI.
      - run: npm install -g npm@latest
      - name: Diagnostics
        run: |
          npm --version
          echo "OIDC available: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          npm config get registry
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      # npm publish runs prepublishOnly, which cleans, builds, tests, and
      # smoke-checks both dist flavors before anything reaches the registry.
      - run: npm publish
